spring.application.name=utility-billing-system
server.port=8080

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/waterms}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=${FLYWAY_ENABLED:false}
spring.flyway.locations=classpath:db/migration

app.jwt.secret=${JWT_SECRET:Y2hhbmdlVGhpc0RldmVsb3BtZW50U2VjcmV0S2V5TXVzdEJlTG9uZ0Vub3VnaDEyMzQ1Njc4OTA}
app.jwt.access-token-minutes=${JWT_ACCESS_MINUTES:60}
app.jwt.refresh-token-days=${JWT_REFRESH_DAYS:7}
app.otp.minutes=${OTP_MINUTES:10}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com


springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
springdoc.api-docs.path=/v3/api-docs
